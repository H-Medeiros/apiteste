<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>APP TESTE</title>
    <link rel="stylesheet" href="/css/style.css">
</head>

<body>
    <main class="container">
        <h1>API text</h1>

        <label for="inputConteudo">Digite um texto:</label>
        <input type="text" id="inputConteudo" placeholder="Escreva aqui"
            style="width: 100%; padding: 8px; margin-bottom: 8px;">
        <button id="submitText">Enviar para /api/textos</button>

        <p style="margin-top: 16px; display: none;" id="resultadoLabel">Resultado:</p>
        <code id="result" style="display: none;"></code>

    </main>

    <script>
        const resultadoLabel = document.getElementById("resultadoLabel");
        const resultadoCode = document.getElementById("result");

        function mostrarResultado(texto) {
            resultadoLabel.style.display = "block";
            resultadoCode.style.display = "block";
            resultadoCode.textContent = texto;
        }

        document.getElementById("submitText").addEventListener("click", async () => {
            const conteudo = document.getElementById("inputConteudo").value.trim();
            if (!conteudo) {
                alert("Digite algo antes de enviar.");
                return;
            }

            const response = await fetch("/api/textos", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ conteudo })
            });

            if (!response.ok) {
                const errorText = await response.text();
                mostrarResultado(`Erro ${response.status}: ${errorText}`);
                return;
            }

            const data = await response.json();
            mostrarResultado(`Salvo: id=${data.id}, conteudo="${data.conteudo}"`);
            document.getElementById("inputConteudo").value = "";
        });

    </script>
</body>

</html>
